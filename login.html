<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理员登录</title>
<style>
  :root{
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --text:#1f2937;
    --text-soft:#6b7280;
    --text-mute:#9ca3af;
    --border:#e5e9f2;
    --border-strong:#d6dce8;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;color:var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(99,102,241,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(59,130,246,.18), transparent 60%),
      #0b1322;
  }
  .wrap{
    min-height:100%;display:grid;place-items:center;padding:24px;
  }
  .login{
    width:100%;max-width:420px;background:#fff;border-radius:18px;
    box-shadow:0 30px 80px rgba(7,11,22,.45);
    overflow:hidden;
  }
  .head{
    padding:40px 30px 6px;text-align:center;
  }
  .logo{
    width:54px;height:54px;border-radius:14px;margin:0 auto 14px;
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px;
    box-shadow:0 10px 24px rgba(59,130,246,.35);
  }
  .head h1{margin:0;font-size:20px;letter-spacing:2px;color:var(--primary);}
  .head p{margin:6px 0 0;font-size:13px;color:var(--text-soft);}

  .body{padding:24px 30px 28px;}
  .field{margin-bottom:14px;}
  .lbl{display:block;font-size:13px;color:var(--text-soft);margin-bottom:6px;}
  .input-wrap{position:relative;}
  .input{
    width:100%;padding:12px 14px 12px 40px;
    border:1px solid var(--border-strong);border-radius:10px;
    font-size:14px;outline:none;transition:.15s;background:#fff;
  }
  .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .ico{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--text-mute);font-size:16px;
  }

  .row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-soft);margin:4px 0 16px;}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .row a{color:var(--primary);text-decoration:none;}

  .btn{
    width:100%;padding:13px;border-radius:10px;border:none;
    background:var(--primary);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:.15s;
  }
  .btn:hover{background:var(--primary-hover);}

  .foot{
    padding:14px 30px 20px;border-top:1px solid var(--border);
    text-align:center;color:var(--text-mute);font-size:12px;background:#fafbff;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="login">
    <div class="head">
      <h1>管理控制台</h1>
      <p>请使用管理员账号登录</p>
    </div>

    <div class="body">
      <div class="field">
        <label class="lbl">账号</label>
        <div class="input-wrap">
          <span class="ico">👤</span>
          <input class="input" id="username" placeholder="请输入管理员账号" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label class="lbl">密码</label>
        <div class="input-wrap">
          <span class="ico">🔒</span>
          <input class="input" id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
        </div>
      </div>

      <div class="row">
        <label><input type="checkbox" /> 记住登录状态</label>
        <a href="#">忘记密码</a>
      </div>

      <button class="btn" id="loginBtn">登 录</button>
    </div>

    <div class="foot">
      © 2026 · 安全登录环境
    </div>
  </div>
</div>
<script>
  const loginBtn = document.getElementById('loginBtn');

  loginBtn.addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if(!username || !password){
      alert('请输入账号和密码');
      return;
    }
    loginBtn.disabled = true;
    loginBtn.textContent = '登录中...';
    try {
      const res = await fetch('/admin/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (data.code !== 0) {
        alert(data.msg || '登录失败');
        return;
      }
      location.href = 'admin.html';
    } catch (err) {
      alert('无法连接服务器');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = '登 录';
    }
  });
</script>
</body>
</html>
