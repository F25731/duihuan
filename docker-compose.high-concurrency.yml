services:
  mysql:
    image: mysql:8.4
    container_name: duihuan-mysql
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=2000
      - --innodb-buffer-pool-size=512M
    environment:
      MYSQL_ROOT_PASSWORD: "change_root_password"
      MYSQL_DATABASE: duihuan
      MYSQL_USER: duihuan
      MYSQL_PASSWORD: "change_duihuan_password"
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u duihuan -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: duihuan-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  duihuan:
    build: .
    container_name: duihuan
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8877:8877"
    volumes:
      - ./data:/app/data
    environment:
      HOST: 0.0.0.0
      PORT: 8877
      WEB_WORKERS: 4
      WEB_THREADS: 8
      WEB_TIMEOUT: 60
      STARTUP_WAIT_SECONDS: 120
      MYSQL_POOL_SIZE: 12
      MYSQL_POOL_WAIT_SECONDS: 5
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: duihuan
      MYSQL_PASSWORD: "change_duihuan_password"
      MYSQL_DATABASE: duihuan
      REDIS_URL: redis://redis:6379/0
      REDIS_PREFIX: duihuan
      ADMIN_USERNAME: Fyanxv
      ADMIN_PASSWORD: "Fyb2530+"
